apiVersion: v1
kind: Service
metadata:
  name: terrigraphic-portfolio-svc
  namespace: portfolio
  labels:
    app: terrigraphic-portfolio
  annotations:
    # Prometheus scrape annotations (optional — remove if not using Prometheus)
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/health"
spec:
  type: ClusterIP          # Traffic comes in via Ingress, not directly
  selector:
    app: terrigraphic-portfolio
  ports:
    - name: http
      protocol: TCP
      port: 80             # Port the Ingress talks to
      targetPort: 3000     # Port the container listens on
