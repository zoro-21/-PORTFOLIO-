apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terrigraphic-portfolio-ingress
  namespace: portfolio
  labels:
    app: terrigraphic-portfolio
  annotations:
    # AWS ALB Ingress Controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # HTTPS — replace with your ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:<AWS_REGION>:<AWS_ACCOUNT_ID>:certificate/<CERTIFICATE_ID>
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"    # Force HTTP → HTTPS

    # Health check using the app's health endpoint
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Security & performance
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      idle_timeout.timeout_seconds=60,
      routing.http.drop_invalid_header_fields.enabled=true,
      routing.http2.enabled=true

spec:
  rules:
    - host: terrigraphic.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: terrigraphic-portfolio-svc
                port:
                  number: 80

    # www redirect — same backend, DNS should CNAME to terrigraphic.com
    - host: www.terrigraphic.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: terrigraphic-portfolio-svc
                port:
                  number: 80
